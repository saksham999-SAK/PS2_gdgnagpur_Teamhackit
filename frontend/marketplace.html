<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Eco Marketplace</title>

<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="marketplace.css">

</head>

<body>

<div id="navbar-container"></div>

<main class="container">

<h1>Eco Marketplace</h1>

<section class="grid">

<div class="card">
<h3>Bamboo Toothbrush</h3>
<p>200 EcoPoints</p>
<button onclick="buyProduct(200)">Redeem</button>
</div>

<div class="card">
<h3>Reusable Bottle</h3>
<p>350 EcoPoints</p>
<button onclick="buyProduct(350)">Redeem</button>
</div>

<div class="card">
<h3>Indoor Plant</h3>
<p>600 EcoPoints</p>
<button onclick="buyProduct(600)">Redeem</button>
</div>

</section>

</main>

<script src="marketplace.js"></script>
<script src="navbar.js"></script>

</body>
</html>
