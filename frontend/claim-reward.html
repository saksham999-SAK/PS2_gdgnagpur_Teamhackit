<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claim Rewards</title>

<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="claim-reward.css">

</head>

<body>

<div id="navbar-container"></div>

<main class="container">

<h1>Claim Rewards</h1>

<div class="pointsCard">

<h3>Your EcoPoints</h3>
<h2 id="points">2540</h2>

</div>

<section class="grid">

<div class="card">
<h3>🌱 Tree Donation</h3>
<p>Donate EcoPoints to plant trees.</p>
<button onclick="goDonation()">Donate Trees</button>
</div>

<div class="card">
<h3>🎫 Travel Vouchers</h3>
<p>Claim transport discounts.</p>
<button onclick="goVoucher()">Get Voucher</button>
</div>

<div class="card">
<h3>🛍 Eco Marketplace</h3>
<p>Buy eco-friendly products.</p>
<button onclick="goMarket()">Open Store</button>
</div>

</section>

</main>

<script src="claim-reward.js"></script>
<script src="navbar.js"></script>
<script src="global-animations.js"></script>

</body>
</html>
