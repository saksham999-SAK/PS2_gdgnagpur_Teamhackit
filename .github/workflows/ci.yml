name: EcoCommit AI — CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  #  Backend Tests (Python + SQLite)
  # ─────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "sqlite:///./test.db"
      SECRET_KEY: "ci-test-secret-key-12345"
      PYTHONPATH: "."

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data (if needed)
        run: |
          python -c "
          try:
              import nltk
              nltk.download('punkt', quiet=True)
              nltk.download('punkt_tab', quiet=True)
              nltk.download('stopwords', quiet=True)
              print('NLTK data downloaded')
          except ImportError:
              print('NLTK not installed, skipping')
          "

      - name: Verify dependency versions
        run: |
          python -c "
          import bcrypt; print(f'bcrypt: {bcrypt.__version__}')
          import passlib; print(f'passlib: {passlib.__version__}')
          import sqlalchemy; print(f'sqlalchemy: {sqlalchemy.__version__}')
          import fastapi; print(f'fastapi: {fastapi.__version__}')
          "

      - name: Run all tests with summary
        run: python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  #  Frontend Lint (basic HTML validation)
  # ─────────────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check frontend files exist
        run: |
          echo "Checking critical frontend files..."
          test -f frontend/api.js       && echo "✓ api.js"
          test -f frontend/login.html   && echo "✓ login.html"
          test -f frontend/login.js     && echo "✓ login.js"
          test -f frontend/signup.html  && echo "✓ signup.html"
          test -f frontend/signup.js    && echo "✓ signup.js"
          test -f frontend/dashboard.html && echo "✓ dashboard.html"
          test -f frontend/dashboard.js && echo "✓ dashboard.js"
          test -f frontend/toast.js     && echo "✓ toast.js"
          test -f frontend/toast.css    && echo "✓ toast.css"
          echo "All frontend files present ✓"

      - name: Verify JS syntax (no syntax errors)
        run: |
          for file in frontend/*.js; do
            node --check "$file" 2>/dev/null || echo "⚠ Syntax check skipped for $file"
          done
          echo "JS syntax check complete ✓"
